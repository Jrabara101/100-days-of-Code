<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 16 - 100 Days of Code</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1 { color: #fff; font-size: 2rem; margin-bottom: 8px; }
        p.subtitle { color: #94a3b8; margin-bottom: 40px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
        .card .icon { font-size: 3rem; margin-bottom: 16px; }
        .card h2 { font-size: 1.3rem; margin-bottom: 8px; }
        .card p { color: #666; font-size: 0.9rem; margin: 0; }
    </style>
</head>
<body>
    <h1>Day 16 — 100 Days of Code</h1>
    <p class="subtitle">UI & interactive mini apps</p>
    <div class="grid">
        <a href="/color-picker/" class="card">
            <div class="icon">🎨</div>
            <h2>Color Picker</h2>
            <p>Pick any color and copy its HEX or RGB value instantly</p>
        </a>
        <a href="/image-slider/" class="card">
            <div class="icon">🃏</div>
            <h2>Image Slider</h2>
            <p>Draggable anime card stack — swipe or click to cycle through</p>
        </a>
        <a href="/minimal-blog-card/" class="card">
            <div class="icon">📰</div>
            <h2>Minimal Blog Card</h2>
            <p>Clean blog card UI with like and share interactions</p>
        </a>
    </div>
</body>
</html>
