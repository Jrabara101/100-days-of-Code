<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Report - Manila</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .weather-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        .location {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }
        .region {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .temp-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .temp {
            font-size: 4rem;
            font-weight: 700;
            color: var(--accent);
        }
        .condition {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            text-transform: capitalize;
        }
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: left;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        .detail-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .detail-value {
            font-size: 1.1rem;
            font-weight: 500;
        }
        .updated {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <div class="location">Manila</div>
        <div class="region">National Capital Region, Philippines</div>
        
        <div class="temp-container">
            <img src="http://cdn.weatherapi.com/weather/64x64/day/116.png" alt="Partly cloudy">
            <div class="temp">32.5°</div>
        </div>
        
        <div class="condition">Partly cloudy</div>
        
        <div class="details">
            <div class="detail-item">
                <span class="detail-label">Feels Like</span>
                <span class="detail-value">38°C</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Humidity</span>
                <span class="detail-value">65%</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Wind</span>
                <span class="detail-value">15.1 km/h</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Direction</span>
                <span class="detail-value">NE</span>
            </div>
        </div>
        
        <div class="updated">Last Updated: 2026-04-23 09:00</div>
    </div>
</body>
</html>
