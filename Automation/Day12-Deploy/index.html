<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 12 - 100 Days of Code</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1 { color: #fff; font-size: 2rem; margin-bottom: 8px; }
        p.subtitle { color: #e0e0e0; margin-bottom: 40px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .card .icon { font-size: 3rem; margin-bottom: 16px; }
        .card h2 { font-size: 1.3rem; margin-bottom: 8px; }
        .card p { color: #666; font-size: 0.9rem; margin: 0; }
    </style>
</head>
<body>
    <h1>Day 12 — 100 Days of Code</h1>
    <p class="subtitle">JavaScript & CSS mini apps</p>
    <div class="grid">
        <a href="/digital-clock/" class="card">
            <div class="icon">🕐</div>
            <h2>Digital Clock</h2>
            <p>Real-time clock displaying the current time and date</p>
        </a>
        <a href="/stopwatch/" class="card">
            <div class="icon">⏱️</div>
            <h2>Stopwatch</h2>
            <p>Start, stop, and reset timer with millisecond precision</p>
        </a>
        <a href="/todo-app/" class="card">
            <div class="icon">📝</div>
            <h2>To-Do App</h2>
            <p>Add, complete, and remove tasks from your list</p>
        </a>
    </div>
</body>
</html>
