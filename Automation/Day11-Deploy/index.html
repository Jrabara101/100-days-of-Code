<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 11 - 100 Days of Code</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1 { color: #fff; font-size: 2rem; margin-bottom: 8px; }
        p { color: #aaa; margin-bottom: 40px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 700px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .card .icon { font-size: 3rem; margin-bottom: 16px; }
        .card h2 { font-size: 1.3rem; margin-bottom: 8px; }
        .card p { color: #666; font-size: 0.9rem; margin: 0; }
    </style>
</head>
<body>
    <h1>Day 11 — 100 Days of Code</h1>
    <p>Mini apps built with HTML, CSS & JavaScript</p>
    <div class="grid">
        <a href="/bmi-calculator/" class="card">
            <div class="icon">⚖️</div>
            <h2>BMI Calculator</h2>
            <p>Calculate your Body Mass Index based on height and weight</p>
        </a>
        <a href="/counter-application/" class="card">
            <div class="icon">🔢</div>
            <h2>Counter Application</h2>
            <p>Simple increment, decrement, and reset counter</p>
        </a>
    </div>
</body>
</html>
