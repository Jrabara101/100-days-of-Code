<script>
        /**
         * Tactical Progression Management Engine Logic
         */
        class ShooterProgressionEngine {
            constructor() {
                this.state = {
                    level: 1,
                    xp: 0,
                    tier: 1, // Tier increases every 10 levels
                    stats: {
                        hp: 100,
                        speedMult: 1.0,
                        damageMult: 1.0
                    },
                    weapons: [
                        { id: 'pistol', name: 'M-11 PISTOL', reqLevel: 1, icon: 'colorize', locked: false },
                        { id: 'grenade', name: 'FRAG GRENADE', reqLevel: 2, icon: 'mode_cool', locked: true },
                        { id: 'shotgun', name: 'TRENCH GUN', reqLevel: 5, icon: 'view_headline', locked: true },
                        { id: 'smg', name: 'VECTOR SMG', reqLevel: 10, icon: 'bolt', locked: true },
                        { id: 'rifle', name: 'ASSAULT RIFLE', reqLevel: 15, icon: 'my_location', locked: true },
                        { id: 'mg', name: 'HEAVY MG', reqLevel: 20, icon: 'drag_handle', locked: true },
                        { id: 'rocket', name: 'RPG LAUNCHER', reqLevel: 30, icon: 'rocket_launch', locked: true },
                        { id: 'laser', name: 'PLASMA CASTER', reqLevel: 50, icon: 'blur_on', locked: true }
                    ]
                };

                this.enemyXpMap = {
                    'Walker': 10,
                    'Runner': 25,
                    'Tank': 100
                };

                this.initUI();
                this.updateUI();
            }

            // XP Formula: O(n^1.5) progression curve
            getXpForNextLevel(targetLevel) {
                return Math.floor(100 * Math.pow(targetLevel, 1.5));
            }

            simulateKill(enemyType) {
                const xpGain = this.enemyXpMap[enemyType] || 0;
                this.addXp(xpGain);
                this.log(`> KILLED [${enemyType.toUpperCase()}] ... +${xpGain} XP`);
            }

            addXp(amount) {
                this.state.xp += amount;
                let nextLevelXp = this.getXpForNextLevel(this.state.level);
                let leveledUp = false;

                while (this.state.xp >= nextLevelXp) {
                    this.state.xp -= nextLevelXp;
                    this.state.level++;
                    nextLevelXp = this.getXpForNextLevel(this.state.level);
                    this.updateStatsOnLevelUp();
                    leveledUp = true;
                }

                if (leveledUp) {
                    this.checkUnlocks();
                    this.log(`>> LEVEL UP: NOW LEVEL ${this.state.level}`, 'text-tertiary-fixed');
                }

                this.updateUI();
            }

            updateStatsOnLevelUp() {
                // Tier logic
                const newTier = Math.floor((this.state.level - 1) / 10) + 1;
                if (newTier > this.state.tier) {
                    this.state.tier = newTier;
                    this.log(`>>> TIER ADVANCEMENT: TIER ${this.state.tier}`, 'text-primary glow-amber');
                }

                // Stat scaling
                this.state.stats.hp = +(100 + (this.state.level * 2.5)).toFixed(1);
                this.state.stats.speedMult = +(1.0 + (this.state.level * 0.01)).toFixed(2);
                this.state.stats.damageMult = +(1.0 + (this.state.level * 0.05)).toFixed(2);
            }

            checkUnlocks() {
                this.state.weapons.forEach(w => {
                    if (w.locked && this.state.level >= w.reqLevel) {
                        w.locked = false;
                        this.log(`> UNLOCKED: ${w.name}`, 'text-secondary-fixed');
                    }
                });
            }

            log(message, cssClass = 'text-on-surface-variant') {
                const terminal = document.getElementById('ui-terminal');
                const entry = document.createElement('div');
                entry.className = cssClass;
                entry.textContent = message;
                terminal.appendChild(entry);
                terminal.scrollTop = terminal.scrollHeight;
            }

            // --- UI Rendering ---

            initUI() {
                this.renderArsenal();
            }

            updateUI() {
                document.getElementById('ui-level').textContent = this.state.level;
                document.getElementById('ui-tier').textContent = this.state.tier;
                
                const nextLevelXp = this.getXpForNextLevel(this.state.level);
                document.getElementById('ui-xp-text').textContent = `${Math.floor(this.state.xp)} / ${nextLevelXp}`;
                
                const fillPercent = Math.min(100, (this.state.xp / nextLevelXp) * 100);
                document.getElementById('ui-xp-fill').style.width = `${fillPercent}%`;

                document.getElementById('ui-hp').textContent = this.state.stats.hp.toFixed(1);
                document.getElementById('ui-spd').textContent = this.state.stats.speedMult.toFixed(2) + 'x';
                document.getElementById('ui-dmg').textContent = this.state.stats.damageMult.toFixed(2) + 'x';

                this.renderArsenal(); // Re-render to update lock states
            }

            renderArsenal() {
                const grid = document.getElementById('ui-arsenal-grid');
                grid.innerHTML = ''; // Clear

                this.state.weapons.forEach(w => {
                    const cardClass = w.locked 
                        ? 'opacity-30 border-outline-variant bg-surface' 
                        : 'border-secondary-fixed bg-surface-container-low glow-cyan';
                    
                    const statusText = w.locked ? `REQ LVL ${w.reqLevel}` : 'UNLOCKED';
                    const statusColor = w.locked ? 'text-error' : 'text-secondary-fixed';

                    const cardHtml = `
                        <div class="hud-border border relative overflow-hidden flex flex-col ${cardClass}">
                            <div class="h-1 w-full bg-secondary-fixed absolute top-0 left-0 ${w.locked ? 'hidden' : ''}"></div>
                            <div class="p-2 flex items-center justify-between">
                                <span class="material-symbols-outlined text-[20px] ${w.locked ? 'text-on-surface-variant' : 'text-secondary-fixed'}">${w.icon}</span>
                                <div class="font-label-sm text-label-sm ${statusColor}">[ ${statusText} ]</div>
                            </div>
                            <div class="px-2 pb-2 mt-auto">
                                <div class="font-body-md text-body-md text-secondary truncate">${w.name}</div>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHtml);
                });
            }
        }

        // Initialize Engine
        const engine = new ShooterProgressionEngine();
    </script>
