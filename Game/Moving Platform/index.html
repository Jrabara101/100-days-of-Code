<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinematic Velocity Inheritance Core Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/98.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/hover.css/2.3.1/css/hover-min.css"/>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #008080; font-family: monospace; }
        canvas { display: block; image-rendering: pixelated; background: #0b0f19; }
        #canvas-viewport-anchor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #retro-os-hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 30; pointer-events: none; }
    </style>
</head>
<body>

    <div id="canvas-viewport-anchor">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="retro-os-hud">
        <div class="window absolute left-6 top-6 w-80 shadow-2xl pointer-events-auto animate__animated animate__zoomIn">
            <div class="title-bar">
                <div class="title-bar-text">PLATFORM_REGISTRY.EXE</div>
                <div class="title-bar-controls"><button aria-label="Close"></button></div>
            </div>
            <div class="window-body flex flex-col gap-3">
                <header class="border-b border-slate-400 pb-1.5">
                    <h2 class="text-slate-800 font-bold text-xs font-mono tracking-wide uppercase">Kinematic Vector Debugger</h2>
                </header>

                <fieldset class="p-2 font-mono text-[11px] text-slate-700 bg-white shadow-inner">
                    <legend class="bg-[#f1f1f1] px-1 font-bold">Player Telemetry</legend>
                    <div class="flex justify-between"><span>🏃 Speed X (Vx):</span><span id="txt-vx" class="font-bold text-blue-800">0.00</span></div>
                    <div class="flex justify-between mt-1"><span>🪂 Speed Y (Vy):</span><span id="txt-vy" class="font-bold text-indigo-800">0.00</span></div>
                    <div class="flex justify-between mt-1 border-t border-slate-200 pt-1"><span>⚓ Riding Link:</span><span id="txt-link" class="font-bold text-slate-600">NONE</span></div>
                </fieldset>

                <div class="flex flex-col gap-1">
                    <button onclick="orchestrator.respawnActor()" class="hvr-grow w-full font-bold" style="padding: 4px 10px;">
                        Respawn Pixel Marine
                    </button>
                </div>
                <div class="text-[9px] text-slate-500 font-mono text-center mt-1">CONTROLS: A/D OR ARROWS = RUN | SPACE = COMPLIANT JUMP</div>
            </div>
        </div>
    </div>

<script>
class HybridMovingPlatformEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        this.resizeViewport();
        window.addEventListener('resize', () => this.resizeViewport());

        // --- SINGLE SOURCE OF TRUTH DATA RECORD ENGINE ---
        // Platforms map explicit movement loops via individual clock cycle configurations
        this.platformsPool = [
            { id: 'PLAT_HORIZONTAL', x: 200, y: 320, w: 120, h: 16, startX: 200, endX: 450, speed: 2.0, dir: 1, dx: 0, dy: 0 },
            { id: 'PLAT_VERTICAL',   x: 580, y: 240, w: 100, h: 16, startY: 180, endY: 380, speed: 1.2, dir: 1, dx: 0, dy: 0 }
        ];

        // Kinematic Player Vector Data Container
        this.player = {
            x: 150, y: 150,
            w: 18, h: 26,
            vx: 0, vy: 0,
            accel: 0.45,
            maxVx: 4.5,
            friction: 0.85,
            gravity: 0.32,
            jumpForce: -7.5,
            
            isGrounded: false,
            ridingPlatformRef: null // Anchors runtime references straight to currently ridden platform
        };

        this.inputState = { left: false, right: false, jump: false };

        this.bindInputEventStreams();
        this.syncHUDViewDisplay();
        this.executeEnginePipelineLoop();
    }

    resizeViewport() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
    }

    bindInputEventStreams() {
        window.addEventListener('keydown', (e) => this.toggleInputKey(e, true));
        window.addEventListener('keyup', (e) => this.toggleInputKey(e, false));
    }

    toggleInputKey(e, isPressed) {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.inputState.left = isPressed;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') this.inputState.right = isPressed;
        if (e.code === 'Space' || e.code === 'KeyW') {
            this.inputState.jump = isPressed;
            if (isPressed) this.executeJumpActionGate();
        }
    }

    respawnActor() {
        this.player.x = 120; this.player.y = 120;
        this.player.vx = 0; this.player.vy = 0;
        this.player.isGrounded = false;
        this.player.ridingPlatformRef = null;
    }

    executeJumpActionGate() {
        // Enforce jumps strictly out from valid contact boundaries positions
        if (this.player.isGrounded) {
            this.player.vy = this.player.jumpForce;
            
            // If leaping off a moving surface, inherit a percentage impulse of its travel vector
            if (this.player.ridingPlatformRef) {
                this.player.vx += this.player.ridingPlatformRef.dx * 0.8;
                this.player.ridingPlatformRef = null;
            }
            this.player.isGrounded = false;
        }
    }

    // --- SUB-SYSTEM: DETERMINISTIC TWO-PHASE KINEMATIC INTEGRATOR ---
    updateKinematicStateMatrices() {
        // --- PHASE A: INDEPENDENT PLATFORMS DISPLACEMENT UPDATE ---
        this.platformsPool.forEach(plat => {
            let prevX = plat.x;
            let prevY = plat.y;

            if (plat.startX !== undefined) {
                // Step horizontal ping-pong platform vectors
                plat.x += plat.speed * plat.dir;
                if (plat.x > plat.endX) { plat.x = plat.endX; plat.dir = -1; }
                if (plat.x < plat.startX) { plat.x = plat.startX; plat.dir = 1; }
            } else if (plat.startY !== undefined) {
                // Step vertical ping-pong platform vectors
                plat.y += plat.speed * plat.dir;
                if (plat.y > plat.endY) { plat.y = plat.endY; plat.dir = -1; }
                if (plat.y < plat.startY) { plat.y = plat.startY; plat.dir = 1; }
            }

            // Capture exact frame translation deltas to pass downstream to passenger entities
            plat.dx = plat.x - prevX;
            plat.dy = plat.y - prevY;
        });

        // --- PHASE B: PLAYER INHERITANCE AND CONTROL PROCESSING ---
        // If tied to an active moving anchor, blit displacement offsets before checking input maps
        if (this.player.ridingPlatformRef) {
            this.player.x += this.player.ridingPlatformRef.dx;
            this.player.y += this.player.ridingPlatformRef.dy;
        }

        // Apply input forces integration
        if (this.inputState.left) this.player.vx -= this.player.accel;
        if (this.inputState.right) this.player.vx += this.player.accel;

        this.player.vx *= this.player.friction;
        this.player.vx = Math.max(-this.player.maxVx, Math.min(this.player.maxVx, this.player.vx));
        
        this.player.x += this.player.vx;
        this.resolveAxisBoundMapIntersections('X');

        this.player.vy += this.player.gravity;
        this.player.y += this.player.vy;
        this.resolveAxisBoundMapIntersections('Y');

        // Capture falling death traps thresholds bounds
        if (this.player.y > this.height) this.respawnActor();
    }

    resolveAxisBoundMapIntersections(axisString) {
        let insideContactFlag = false;

        for (let i = 0; i < this.platformsPool.length; i++) {
            let plat = this.platformsPool[i];

            // Standard Axis-Aligned Bounding Box (AABB) intersection check parameters
            if (this.player.x < plat.x + plat.w &&
                this.player.x + this.player.w > plat.x &&
                this.player.y < plat.y + plat.h &&
                this.player.y + this.player.h > plat.y) {

                insideContactFlag = true;

                if (axisString === 'X') {
                    // Push back horizontal overlap positions cleanly along the movement axis
                    if (this.player.vx > 0) this.player.x = plat.x - this.player.w;
                    if (this.player.vx < 0) this.player.x = plat.x + plat.w;
                    this.player.vx = 0;
                } else if (axisString === 'Y') {
                    // Push back vertical overlap positions cleanly along the movement axis
                    if (this.player.vy > 0) { // Landing smoothly down onto top surface ledge face
                        this.player.y = plat.y - this.player.h;
                        this.player.isGrounded = true;
                        this.player.vy = 0;
                        this.player.ridingPlatformRef = plat; // Establish explicit coordinate tracking link
                    } else if (this.player.vy < 0) { // Crashing ceiling blocks from below
                        this.player.y = plat.y + plat.h;
                        this.player.vy = 0;
                    }
                }
            }
        }

        // Downward Line-of-Sight verification pass: Clear links if player steps off platform boundaries edges
        if (axisString === 'Y' && this.player.ridingPlatformRef) {
            let linkedPlat = this.player.ridingPlatformRef;
            if (this.player.x + this.player.w < linkedPlat.x || this.player.x > linkedPlat.x + linkedPlat.w) {
                this.player.ridingPlatformRef = null;
                this.player.isGrounded = false;
            }
        }
    }

    // --- HIGH-PERFORMANCE DISPLAY REPAINT BLITTING PASS ---
    executeEnginePipelineLoop() {
        // Advance logic state updates matrices snapshots
        this.updateKinematicStateMatrices();

        // Flush frame canvas layers output contexts
        this.ctx.clearRect(0, 0, this.width, this.height);

        // Render Stage 1: Draw Active Moving Platforms
        this.ctx.fillStyle = '#1e293b'; // Slate Metallic Platform Block
        this.platformsPool.forEach(plat => {
            // Truncate floating-point positions to raw integers to eliminate texture bleeding and blur shifts
            let snapX = Math.floor(plat.x);
            let snapY = Math.floor(plat.y);

            this.ctx.fillRect(snapX, snapY, plat.w, plat.h);
            
            // Highlight upper shelf landing lips
            this.ctx.fillStyle = '#475569';
            this.ctx.fillRect(snapX, snapY, plat.w, 3);
            this.ctx.fillStyle = '#1e293b'; // Restore brush tracking color index
        });

        // Render Stage 2: Draw Character Marine Avatar Capsule
        let playerSnapX = Math.floor(this.player.x);
        let playerSnapY = Math.floor(this.player.y);

        this.ctx.fillStyle = '#06b6d4'; // Sharp Cyan Hero Box Silhouette
        this.ctx.fillRect(playerSnapX, playerSnapY, this.player.w, this.player.h);

        this.ctx.strokeStyle = '#022329';
        this.ctx.lineWidth = 2;
        this.ctx.strokeRect(playerSnapX, playerSnapY, this.player.w, this.player.h);

        // System telemetry update throttling limits optimization
        if (Date.now() % 3 === 0) this.syncHUDViewDisplay();

        requestAnimationFrame(() => this.executeEnginePipelineLoop());
    }

    syncHUDViewDisplay() {
        document.getElementById('txt-vx').innerText = this.player.vx.toFixed(2);
        document.getElementById('txt-vy').innerText = this.player.vy.toFixed(2);
        
        let linkLabel = document.getElementById('txt-link');
        if (this.player.ridingPlatformRef) {
            linkLabel.innerText = this.player.ridingPlatformRef.id;
            linkLabel.className = "text-blue-800 font-bold animate__animated animate__pulse animate__infinite";
        } else {
            linkLabel.innerText = "AIRBORNE_NULL";
            linkLabel.className = "text-slate-400";
        }
    }
}

// Global Application Core Controller Context Activation Inception Path
let orchestrator;
window.onload = () => { orchestrator = new HybridMovingPlatformEngine(); };
</script>
</body>
</html>
