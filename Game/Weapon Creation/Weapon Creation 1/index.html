    <style>
        /* Bio-Organic Aesthetics & Animations */
        body {
            background-color: #0D001A;
            color: #e5e2e1;
        }

        .organic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(26, 0, 51, 0.8) 0%, rgba(13, 0, 26, 1) 100%);
            z-index: -1;
        }

        .floating-panel {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 0, 255, 0.1);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

        .canvas-organic {
            background: radial-gradient(circle at center, rgba(255, 0, 255, 0.1) 0%, transparent 70%);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 40px;
            box-shadow: inset 0 0 50px rgba(255, 0, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .canvas-organic::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 255, 0.05) 0%, transparent 50%);
            animation: pulseGlowOrganic 8s ease-in-out infinite alternate;
        }

        @keyframes pulseGlowOrganic {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .glow-active {
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        .glow-text-active {
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.6);
        }

        .btn-primary-glow:hover {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* Input overrides for organic look */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            background: #00FFFF;
            border-radius: 50%;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        input[type="range"]:hover::-webkit-slider-thumb {
            transform: scale(1.2);
            box-shadow: 0 0 15px #00FFFF;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 0, 255, 0.3);
            border-radius: 10px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 0, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #FF00FF;
        }

        @keyframes organicBoot {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-boot-1 {
            animation: organicBoot 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            animation-delay: 0.1s;
        }

        .animate-boot-2 {
            animation: organicBoot 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            animation-delay: 0.2s;
        }

        .animate-boot-3 {
            animation: organicBoot 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            animation-delay: 0.3s;
        }

        /* Hover states for categories */

            margin: 4px 0;

            transform: translateX(8px);
            color: #00FFFF;
        }

        .category-item:hover span {
