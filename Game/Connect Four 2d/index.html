<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Pixel Connect Four</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ffcc;
            --secondary-color: #ff0055;
            --tertiary-color: #f59e0b;
            --background-color: #05050a;
            --arcade-panel-bg: #0d0d18;
            --crt-glow: rgba(0, 255, 204, 0.15);
        }

        body {
            margin: 0; 
            background-color: var(--background-color); 
            color: #fff;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Outer Arcade Cabinet Frame */
        .arcade-cabinet {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 24px;
            background: linear-gradient(135deg, #18182c 0%, #0d0d16 100%);
            border: 6px solid #2e2e4f;
            border-radius: 24px;
            box-shadow: 
                0 0 40px rgba(0, 0, 0, 0.8),
                0 25px 50px -12px rgba(0, 255, 204, 0.1);
        }

        /* CRT Monitor Wrapper simulating curved screen and hardware scanlines */
        .crt-monitor {
            position: relative;
            padding: 16px;
            background: #09090e;
            border-radius: 16px;
            border: 8px solid #111122;
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.95),
                0 0 35px var(--crt-glow),
                0 15px 30px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tube curve shadow */
        .crt-screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            pointer-events: none;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.9);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.015) 0%, rgba(0, 0, 0, 0.45) 100%);
        }

        /* Hardware scanlines overlay */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.4) 50%
            );
            background-size: 100% 4px;
            z-index: 101;
            pointer-events: none;
            animation: scanline-scroll 20s linear infinite;
        }

        /* Screen phosphor flicker */
        .flicker {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 16, 16, 0.03);
            opacity: 0.15;
            z-index: 102;
            pointer-events: none;
            animation: flicker-anim 0.25s infinite;
        }

        @keyframes scanline-scroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        @keyframes flicker-anim {
            0% { opacity: 0.12; }
            50% { opacity: 0.15; }
            100% { opacity: 0.11; }
        }

        .ui-panel { 
            text-align: center; 
            margin-bottom: 14px; 
            z-index: 10;
        }
        
        h1 { 
            margin: 0; 
            font-size: 16px; 
            color: var(--primary-color); 
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
        }
        
        #status-display {
            font-size: 10px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-shadow: 0 0 6px currentColor;
        }

        #canvas-container {
            position: relative;
            border: 4px solid #18182c;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }
        
        /* Forces the canvas to render razor-sharp nearest-neighbor scaling */
        canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            display: block;
            width: 512px;
            height: 480px;
        }

        /* Screen Overlay Containers */
        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 8, 16, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 1;
            transition: opacity 0.25s ease;
        }

        .screen-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .screen-overlay h2 {
            font-size: 14px;
            color: var(--primary-color);
            margin-bottom: 24px;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
            text-align: center;
            line-height: 1.8;
        }

        .menu-button {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #fff;
            background: #121224;
            border: 2px solid var(--primary-color);
            padding: 14px 20px;
            margin: 8px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.15);
            transition: all 0.1s ease;
            width: 260px;
            text-align: center;
        }

        .menu-button:hover {
            background: var(--primary-color);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        .menu-button:active {
            transform: scale(0.98);
        }

        /* Cabinet Lower Settings Control Panel */
        .control-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 14px;
            z-index: 10;
        }

        .control-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            background: rgba(24, 24, 44, 0.7);
            border: 1px solid #3a3a5f;
            color: #8f8faf;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s ease;

            color: #fff;
            text-shadow: 0 0 5px var(--primary-color);
        }

        .control-btn:active {

// --- WEB AUDIO API CHIPTUNE AUDIO SYNTHESIZER ---
class SoundSynth {
    constructor() {
        this.ctx = null;
        this.muted = false;
    }

    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    }

    playSelect() {
        if (this.muted) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        
        gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.06);
    }

    playDrop() {
        if (this.muted) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(550, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(120, this.ctx.currentTime + 0.3);
        
        gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.32);
    }

    playBounce() {
        if (this.muted) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(90, this.ctx.currentTime);
        osc.frequency.setValueAtTime(170, this.ctx.currentTime + 0.04);
        osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.12);
        
        gain.gain.setValueAtTime(0.18, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.12);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.14);
    }

    playError() {
        if (this.muted) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(110, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.2);
        
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.22);
    }

    playWin() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        // Ascending major arpeggio
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        notes.forEach((freq, idx) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, now + idx * 0.1);
            gain.gain.setValueAtTime(0.08, now + idx * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.1 + 0.45);
            
            osc.start(now + idx * 0.1);
            osc.stop(now + idx * 0.1 + 0.5);
        });
    }

    playDraw() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        // Descending flat chord
        const notes = [392.00, 349.23, 311.13, 261.63]; // G4, F4, Eb4, C4
        notes.forEach((freq, idx) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, now + idx * 0.12);
            gain.gain.setValueAtTime(0.08, now + idx * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.12 + 0.35);
            
            osc.start(now + idx * 0.12);
            osc.stop(now + idx * 0.12 + 0.4);
        });
    }
}
const synth = new SoundSynth();

// --- SMART LOCAL AI (MINIMAX WITH ALPHA-BETA PRUNING) ---
class ConnectFourAI {
    constructor(rows, cols) {
        this.rows = rows;
        this.cols = cols;
        this.AI_PLAYER = 2;
        this.HUMAN_PLAYER = 1;
    }

    getValidMoves(grid) {
        let moves = [];
        for (let c = 0; c < this.cols; c++) {
            if (grid[0][c] === 0) moves.push(c);
        }
        return moves;
    }

    getNextOpenRow(grid, col) {
        for (let r = this.rows - 1; r >= 0; r--) {
            if (grid[r][col] === 0) return r;
        }
        return -1;
    }

    isTerminalNode(grid) {
        return this.checkWin(grid, this.HUMAN_PLAYER) || 
               this.checkWin(grid, this.AI_PLAYER) || 
               this.getValidMoves(grid).length === 0;
    }

    checkWin(grid, player) {
        // Horizontal
        for (let r = 0; r < this.rows; r++) {
            for (let c = 0; c < this.cols - 3; c++) {
                if (grid[r][c] === player && grid[r][c+1] === player && 
                    grid[r][c+2] === player && grid[r][c+3] === player) return true;
            }
        }
        // Vertical
        for (let r = 0; r < this.rows - 3; r++) {
            for (let c = 0; c < this.cols; c++) {
                if (grid[r][c] === player && grid[r+1][c] === player && 
                    grid[r+2][c] === player && grid[r+3][c] === player) return true;
            }
        }
        // Diagonal /
        for (let r = 3; r < this.rows; r++) {
            for (let c = 0; c < this.cols - 3; c++) {
                if (grid[r][c] === player && grid[r-1][c+1] === player && 
                    grid[r-2][c+2] === player && grid[r-3][c+3] === player) return true;
            }
        }
        // Diagonal \
        for (let r = 0; r < this.rows - 3; r++) {
            for (let c = 0; c < this.cols - 3; c++) {
                if (grid[r][c] === player && grid[r+1][c+1] === player && 
                    grid[r+2][c+2] === player && grid[r+3][c+3] === player) return true;
            }
        }
        return false;
    }

    evaluateWindow(window, player) {
        let score = 0;
        const oppPlayer = player === this.AI_PLAYER ? this.HUMAN_PLAYER : this.AI_PLAYER;

        const playerCount = window.filter(cell => cell === player).length;
        const emptyCount = window.filter(cell => cell === 0).length;
        const oppCount = window.filter(cell => cell === oppPlayer).length;

        if (playerCount === 4) {
            score += 100000;
        } else if (playerCount === 3 && emptyCount === 1) {
            score += 100;
        } else if (playerCount === 2 && emptyCount === 2) {
            score += 10;
        }

        if (oppCount === 3 && emptyCount === 1) {
            score -= 400; // Prioritize blocking
        } else if (oppCount === 2 && emptyCount === 2) {
            score -= 15;
        }

        return score;
    }

    scorePosition(grid, player) {
        let score = 0;

        // Center column preference (gives more options)
        const centerCol = Math.floor(this.cols / 2);
        let centerCount = 0;
        for (let r = 0; r < this.rows; r++) {
            if (grid[r][centerCol] === player) centerCount++;
        }
        score += centerCount * 4;

        // Horizontal
        for (let r = 0; r < this.rows; r++) {
            for (let c = 0; c < this.cols - 3; c++) {
                const window = [grid[r][c], grid[r][c+1], grid[r][c+2], grid[r][c+3]];
                score += this.evaluateWindow(window, player);
            }
        }

        // Vertical
        for (let c = 0; c < this.cols; c++) {
            for (let r = 0; r < this.rows - 3; r++) {
                const window = [grid[r][c], grid[r+1][c], grid[r+2][c], grid[r+3][c]];
                score += this.evaluateWindow(window, player);
            }
        }

        // Diagonal /
        for (let r = 3; r < this.rows; r++) {
            for (let c = 0; c < this.cols - 3; c++) {
                const window = [grid[r][c], grid[r-1][c+1], grid[r-2][c+2], grid[r-3][c+3]];
                score += this.evaluateWindow(window, player);
            }
        }

        // Diagonal \
        for (let r = 0; r < this.rows - 3; r++) {
            for (let c = 0; c < this.cols - 3; c++) {
                const window = [grid[r][c], grid[r+1][c+1], grid[r+2][c+2], grid[r+3][c+3]];
                score += this.evaluateWindow(window, player);
            }
        }

        return score;
    }

    minimax(grid, depth, alpha, beta, maximizingPlayer) {
        const isTerminal = this.isTerminalNode(grid);
        if (depth === 0 || isTerminal) {
            if (isTerminal) {
                if (this.checkWin(grid, this.AI_PLAYER)) {
                    return { score: 10000000 + depth, column: -1 };
                } else if (this.checkWin(grid, this.HUMAN_PLAYER)) {
                    return { score: -10000000 - depth, column: -1 };
                } else {
                    return { score: 0, column: -1 };
                }
            }
            return { score: this.scorePosition(grid, this.AI_PLAYER), column: -1 };
        }

        const validMoves = this.getValidMoves(grid);
        // Center-focused column ordering to maximize alpha-beta cutoff speed
        const centerCol = Math.floor(this.cols / 2);
        validMoves.sort((a, b) => Math.abs(a - centerCol) - Math.abs(b - centerCol));

        if (maximizingPlayer) {
            let maxEval = -Infinity;
            let bestCol = validMoves[0];
            for (let col of validMoves) {
                const row = this.getNextOpenRow(grid, col);
                grid[row][col] = this.AI_PLAYER;
                const score = this.minimax(grid, depth - 1, alpha, beta, false).score;
                grid[row][col] = 0; // undo

                if (score > maxEval) {
                    maxEval = score;
                    bestCol = col;
                }
                alpha = Math.max(alpha, score);
                if (beta <= alpha) break; // prune
            }
            return { score: maxEval, column: bestCol };
        } else {
            let minEval = Infinity;
            let bestCol = validMoves[0];
            for (let col of validMoves) {
                const row = this.getNextOpenRow(grid, col);
                grid[row][col] = this.HUMAN_PLAYER;
                const score = this.minimax(grid, depth - 1, alpha, beta, true).score;
                grid[row][col] = 0; // undo

                if (score < minEval) {
                    minEval = score;
                    bestCol = col;
                }
                beta = Math.min(beta, score);
                if (beta <= alpha) break; // prune
            }
            return { score: minEval, column: bestCol };
        }
    }

    getBestMove(grid) {
        const tempGrid = grid.map(row => [...row]);
        // Depth 5 provides high skill play while maintaining rapid thread execution (< 30ms)
        const result = this.minimax(tempGrid, 5, -Infinity, Infinity, true);
        return result.column;
    }
}

// --- PHASER 3 GAME SCENE DESIGN ---
class PixelConnectFour extends Phaser.Scene {
    constructor() {
        super('PlayGame');
    }

    preload() {
        // --- PROCEDURAL 8-BIT TEXTURE GENERATION ---
        
        // 1. Retro Board Frame (16x16 pixel block with a circular slot hole)
        const boardMatrix = [
            '2222222222222222',
            '2111111111111112',
            '2110000000001112',
            '2100000000000012',
            '21000....0000012',
            '2100......000012',
            '210........00012',
            '210........00012',
            '210........00012',
            '210........00012',
            '2100......000012',
            '21000....0000012',
            '2100000000000012',
            '2110000000001112',
            '2111111111111112',
            '2222222222222222'
        ];
        this.textures.generate('pixel-board', { data: boardMatrix, pixelWidth: 2, pixelHeight: 2, palette: { '0': '#111122', '1': '#3b82f6', '2': '#1d4ed8', '.': 'transparent' } });

        // 2. Symmetric Retro Shaded Coin (14x14 matrix)
        const coinMatrix = [
            '...22222222...',
            '..2111111112..',
            '.211111111112.',
            '.211000000112.',
            '21101111110112',
            '21101111110112',
            '21101111110112',
            '21101111110112',
            '21101111110112',
            '21101111110112',
            '.211000000112.',
            '.211111111112.',
            '..2222222222..',
            '...22222222...'
        ];

        // Player 1 (Neon Red Coin)
        this.textures.generate('coin-p1', { data: coinMatrix, pixelWidth: 2, pixelHeight: 2, palette: { '0': '#ff8093', '1': '#ef4444', '2': '#991b1b', '.': 'transparent' } });

        // Player 2 (Neon Gold Coin)
        this.textures.generate('coin-p2', { data: coinMatrix, pixelWidth: 2, pixelHeight: 2, palette: { '0': '#ffe066', '1': '#f59e0b', '2': '#78350f', '.': 'transparent' } });
    }

    create() {
        this.rows = 6;
        this.cols = 7;
        this.cellSize = 32; // 16x16 matrix with 2x scale multipliers = 32px
        this.boardOffset = { x: 16, y: 32 };
        
        this.grid = Array(this.rows).fill().map(() => Array(this.cols).fill(0));
        this.currentPlayer = 1;
        this.isLocked = false;
        this.gameOver = false;
        this.gameState = 0; // 0 = MENU, 1 = PLAYING, 2 = GAMEOVER
        this.gameMode = 'pvp'; // 'pvp' or 'pve'
        this.statusDisplay = document.getElementById('status-display');

        // AI Engine Initialize
        this.ai = new ConnectFourAI(this.rows, this.cols);

        // Selector Visual Line Indicator
        this.selector = this.add.graphics();
        this.selectorCol = 0;

        // Floating preview token indicating whose turn it is
        this.previewCoin = this.add.sprite(0, 0, 'coin-p1').setDepth(3).setAlpha(0.85);
        this.previewCoin.visible = false;

        // Keyboard Controls
        this.input.keyboard.on('keydown-LEFT', () => {
            if (this.gameState !== 1 || this.isLocked || this.gameOver) return;
            if (this.gameMode === 'pve' && this.currentPlayer === 2) return; // Block human during AI thinking
            this.moveSelector(-1);
            synth.playSelect();
        });

        this.input.keyboard.on('keydown-RIGHT', () => {
            if (this.gameState !== 1 || this.isLocked || this.gameOver) return;
            if (this.gameMode === 'pve' && this.currentPlayer === 2) return;
            this.moveSelector(1);
            synth.playSelect();
        });

        this.input.keyboard.on('keydown-SPACE', () => {
            if (this.gameState !== 1 || this.isLocked || this.gameOver) return;
            if (this.gameMode === 'pve' && this.currentPlayer === 2) return;
            this.dropToken();
        });

        // Mouse/Pointer Controls
        this.input.on('pointermove', (pointer) => {
            if (this.gameState !== 1 || this.isLocked || this.gameOver) return;
            if (this.gameMode === 'pve' && this.currentPlayer === 2) return;
            this.handleMouseMove(pointer);
        });

        this.input.on('pointerdown', (pointer) => {
            if (this.gameState !== 1 || this.isLocked || this.gameOver) return;
            if (this.gameMode === 'pve' && this.currentPlayer === 2) return;
            this.handleMouseClick(pointer);
        });

        // Draw foreground block grid
        this.buildBoardView();
    }

    startGame(mode) {
        this.gameMode = mode;
        this.grid = Array(this.rows).fill().map(() => Array(this.cols).fill(0));
        this.currentPlayer = 1;
        this.isLocked = false;
        this.gameOver = false;
        this.gameState = 1; // STATE_PLAYING
        this.selectorCol = 0;

        // Clear win flashing timers
        if (this.winFlashEvent) {
            this.winFlashEvent.destroy();
            this.winFlashEvent = null;
        }

        this.clearCoins();
        
        // Status resets
        this.statusDisplay.innerText = "P1 TURN";
        this.statusDisplay.style.color = '#ff0055';

        this.drawSelector();
        this.updatePreviewCoin();
    }

    resetToMenu() {
        this.gameState = 0; // STATE_MENU
        if (this.winFlashEvent) {
            this.winFlashEvent.destroy();
            this.winFlashEvent = null;
        }
        this.clearCoins();
        this.selector.clear();
        if (this.previewCoin) {
            this.previewCoin.visible = false;
        }
    }

    buildBoardView() {
        // Overlay standard visual block grid over coin depths
        for (let r = 0; r < this.rows; r++) {
            for (let c = 0; c < this.cols; c++) {
                let x = this.boardOffset.x + (c * this.cellSize);
                let y = this.boardOffset.y + (r * this.cellSize);
                let cell = this.add.sprite(x, y, 'pixel-board').setOrigin(0);
                cell.setDepth(2); // Retain board structure in front of sliding coins
            }
        }
    }

    drawSelector() {
        this.selector.clear();
        if (this.gameState !== 1 || this.gameOver) return;
        
        // Custom neon cyan alpha box outline
        this.selector.lineStyle(2, 0x00ffcc, 0.6);
        let x = this.boardOffset.x + (this.selectorCol * this.cellSize);
        this.selector.strokeRect(x, this.boardOffset.y, this.cellSize, this.rows * this.cellSize);
    }

    updatePreviewCoin() {
        if (this.gameState !== 1 || this.gameOver || (this.gameMode === 'pve' && this.currentPlayer === 2)) {
            this.previewCoin.visible = false;
            return;
        }
        let x = this.boardOffset.x + (this.selectorCol * this.cellSize) + 16;
        let y = this.boardOffset.y - 12; // Floating above board columns
        this.previewCoin.setPosition(x, y);
        this.previewCoin.setTexture(this.currentPlayer === 1 ? 'coin-p1' : 'coin-p2');
        this.previewCoin.visible = true;
    }

    moveSelector(dir) {
        if (this.gameOver) return;
        this.selectorCol = Phaser.Math.Clamp(this.selectorCol + dir, 0, this.cols - 1);
        this.drawSelector();
        this.updatePreviewCoin();
    }

    handleMouseMove(pointer) {
        let localX = pointer.x - this.boardOffset.x;
        if (localX >= 0 && localX < this.cols * this.cellSize) {
            let col = Math.floor(localX / this.cellSize);
            if (col !== this.selectorCol) {
                this.selectorCol = col;
                this.drawSelector();
                this.updatePreviewCoin();
                synth.playSelect();
            }
        }
    }

    handleMouseClick(pointer) {
        let localX = pointer.x - this.boardOffset.x;
        if (localX >= 0 && localX < this.cols * this.cellSize) {
            this.selectorCol = Math.floor(localX / this.cellSize);
            this.drawSelector();
            this.dropToken();
        }
    }

    dropToken() {
        if (this.isLocked || this.gameOver || this.gameState !== 1) return;

        let col = this.selectorCol;
        let targetRow = -1;
        for (let r = this.rows - 1; r >= 0; r--) {
            if (this.grid[r][col] === 0) {
                targetRow = r;
                break;
            }
        }

        if (targetRow === -1) {
            synth.playError();
            return; // Column full feedback
        }

        this.isLocked = true;
        this.grid[targetRow][col] = this.currentPlayer;
        
        // Disable selector visual and floating preview while dropping
        this.selector.clear();
        this.previewCoin.visible = false;

        let startY = this.boardOffset.y - 12;
        let targetY = this.boardOffset.y + (targetRow * this.cellSize) + 16;
        let targetX = this.boardOffset.x + (col * this.cellSize) + 16;

        let tokenKey = this.currentPlayer === 1 ? 'coin-p1' : 'coin-p2';
        let tokenSprite = this.add.sprite(targetX, startY, tokenKey).setDepth(1);

        synth.playDrop();

        // Bounce drop tween animation
        this.tweens.add({
            targets: tokenSprite,
            y: targetY,
            duration: 350,
            ease: 'Bounce.easeOut',
            onComplete: () => {
                synth.playBounce();
                this.evaluateWinState(targetRow, col, tokenSprite);
            }
        });
    }

    evaluateWinState(row, col, finalSprite) {
        const vectors = [
            { r: 0, c: 1 },  // Horizontal
            { r: 1, c: 0 },  // Vertical
            { r: 1, c: 1 },  // Diagonal /
            { r: 1, c: -1 }  // Diagonal \
        ];

        for (let vec of vectors) {
            let winLine = [{ r: row, c: col }];
            this.scanVector(row, col, vec.r, vec.c, winLine);
            this.scanVector(row, col, -vec.r, -vec.c, winLine);

            if (winLine.length >= 4) {
                this.triggerGameOver(winLine);
                return;
            }
        }

        // Draw detection
        if (this.grid[0].every(cell => cell !== 0)) {
            this.gameOver = true;
            this.gameState = 2;
            synth.playDraw();
            
            document.getElementById('winner-text').innerText = "DRAW GAME";
            document.getElementById('winner-text').style.color = "#94a3b8";
            this.statusDisplay.innerText = "DRAW GAME";
            this.statusDisplay.style.color = "#94a3b8";
            
            this.time.delayedCall(1200, () => {
                document.getElementById('gameover-screen').classList.remove('hidden');
            });
            return;
        }

        // Swap players
        this.currentPlayer = this.currentPlayer === 1 ? 2 : 1;
        
        let pName = this.currentPlayer === 1 ? "P1 TURN" : (this.gameMode === 'pve' ? "CPU TURN" : "P2 TURN");
        let pColor = this.currentPlayer === 1 ? '#ff0055' : '#f59e0b';
        this.statusDisplay.innerText = pName;
        this.statusDisplay.style.color = pColor;

        this.isLocked = false;
        this.drawSelector();
        this.updatePreviewCoin();

        // Trigger CPU play if in PvE
        if (this.gameMode === 'pve' && this.currentPlayer === 2 && !this.gameOver) {
            this.triggerCPUMove();
        }
    }

    scanVector(startR, startC, dr, dc, matchPool) {
        let r = startR + dr;
        let c = startC + dc;
        while (r >= 0 && r < this.rows && c >= 0 && c < this.cols) {
            if (this.grid[r][c] === this.currentPlayer) {
                matchPool.push({ r, c });
                r += dr;
                c += dc;
            } else { break; }
        }
    }

    triggerCPUMove() {
        this.isLocked = true;
        this.statusDisplay.innerText = "CPU THINKING...";
        this.statusDisplay.style.color = '#f59e0b';
        
        // Hide preview coin during CPU calculation
        this.previewCoin.visible = false;

        this.time.delayedCall(700, () => {
            let cpuCol = this.ai.getBestMove(this.grid);
            this.selectorCol = cpuCol;
            this.drawSelector();
            this.isLocked = false; // Temporarily unlock to trigger the drop
            this.dropToken();
        });
    }

    triggerGameOver(winningLine) {
        this.gameOver = true;
        this.isLocked = true;
        this.gameState = 2; // STATE_GAMEOVER
        this.selector.clear();
        this.previewCoin.visible = false;
        
        let winnerName = this.currentPlayer === 1 ? "PLAYER 1 WINS!" : (this.gameMode === 'pve' ? "CPU WINS!" : "PLAYER 2 WINS!");
        let winnerColor = this.currentPlayer === 1 ? '#ff0055' : '#f59e0b';
        
        this.statusDisplay.innerText = winnerName;
        this.statusDisplay.style.color = winnerColor;
        
        synth.playWin();

        // Triumphant win line flashing overlay
        this.winFlashEvent = this.time.addEvent({
            delay: 150,
            callback: () => {
                winningLine.forEach(coord => {
                    let x = this.boardOffset.x + (coord.c * this.cellSize) + 16;
                    let y = this.boardOffset.y + (coord.r * this.cellSize) + 16;
                    
                    let children = this.children.list;
                    children.forEach(child => {
                        if (child.x === x && child.y === y && child.depth === 1) {
                            child.visible = !child.visible;
                        }
                    });
                });
            },
            loop: true
        });

        // Delay overlay fade-in so the victory flash shows clearly
        this.time.delayedCall(1600, () => {
            document.getElementById('winner-text').innerText = winnerName;
            document.getElementById('winner-text').style.color = winnerColor;
            document.getElementById('gameover-screen').classList.remove('hidden');
        });
    }

    clearCoins() {
        let coins = [];
        this.children.list.forEach(child => {
            if (child.texture && (child.texture.key === 'coin-p1' || child.texture.key === 'coin-p2')) {
                coins.push(child);
            }
        });
        coins.forEach(coin => {
            if (coin !== this.previewCoin) {
                coin.destroy();
            }
        });
    }
}

// Framework configurations tailored for retro resolution
const config = {
    type: Phaser.AUTO,
    width: 256,   // Retro NES style tight width
    height: 240,  // Retro NES style tight height
    parent: 'canvas-container',
    backgroundColor: '#05050a',
    
    pixelArt: true,   // Forces WebGL nearest-neighbor filtering profile
    roundPixels: true, // Prevents subpixel stuttering lines
    
    physics: { default: 'arcade' },
    scene: PixelConnectFour
};

const game = new Phaser.Game(config);

// --- GLOBAL BRIDGE INTERFACE CONTROLS ---
let selectedMode = 'pvp';

function selectMode(mode) {
    selectedMode = mode;
    document.getElementById('start-screen').classList.add('hidden');
    synth.playSelect();
    const scene = game.scene.getScene('PlayGame');
    if (scene) {
        scene.startGame(mode);
    }
}

function restartGame() {
    document.getElementById('gameover-screen').classList.add('hidden');
    synth.playSelect();
    const scene = game.scene.getScene('PlayGame');
    if (scene) {
        scene.startGame(selectedMode);
    }
}

function showMainMenu() {
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('start-screen').classList.remove('hidden');
    synth.playSelect();
    const scene = game.scene.getScene('PlayGame');
    if (scene) {
        scene.resetToMenu();
    }
}

function toggleMute() {
    synth.muted = !synth.muted;
    document.getElementById('mute-btn').innerText = synth.muted ? "SOUND: OFF" : "SOUND: ON";
    synth.playSelect();
}
</script>
