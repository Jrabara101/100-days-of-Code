<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEONBREAK — Cyberpunk Arkanoid</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap');
:root{--cyan:#00D9FF;--magenta:#FF006E;--yellow:#FFD60A;--bg:#0A1428;--text:#E8F4FF;--dim:#4A6080;--green:#00FF9F;--red:#FF3B3B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Exo 2',sans-serif;}
#wrap{position:relative;}
canvas{display:block;image-rendering:crisp-edges;cursor:none;}
#toasts{position:absolute;bottom:90px;left:10px;display:flex;flex-direction:column-reverse;gap:5px;pointer-events:none;}
.toast{background:rgba(10,20,40,0.88);border:1px solid #00D9FF;border-left:3px solid #00D9FF;color:#E8F4FF;font-family:'Share Tech Mono',monospace;font-size:11px;padding:5px 9px;border-radius:4px;animation:tIn .3s ease;transition:opacity .4s;min-width:150px;}
.toast.exp{border-left-color:var(--red);animation:pulse .5s infinite;}
.tbar{height:2px;margin-top:3px;transition:width .1s linear;}
@keyframes tIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#cur{position:fixed;pointer-events:none;width:10px;height:10px;border:2px solid var(--cyan);border-radius:50%;transform:translate(-50%,-50%);z-index:999;mix-blend-mode:screen;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc"></canvas>
  <div id="toasts"></div>
</div>
<div id="cur"></div>
<script>
'use strict';
const GW=600,GH=780;
const COLS=10,BW=52,BH=18,BGAP=2,BRICK_Y=90;
const C={cyan:'#00D9FF',mag:'#FF006E',yel:'#FFD60A',bg:'#0A1428',txt:'#E8F4FF',dim:'#4A6080',grn:'#00FF9F',red:'#FF3B3B',orn:'#FF6B35',pur:'#9B5DE5'};

// ── AUDIO ──────────────────────────────────────────────────────────────────
const Aud=(()=>{
  let ac=null,mg,bg,bgn=null;
  const init=()=>{if(ac)return;ac=new(window.AudioContext||window.webkitAudioContext)();mg=ac.createGain();mg.gain.value=.32;mg.connect(ac.destination);bg=ac.createGain();bg.gain.value=0;bg.connect(mg);};
  const t=(f,tp,v,d,at)=>{if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=tp||'sine';o.frequency.setValueAtTime(f,at||ac.currentTime);g.gain.setValueAtTime(v||.25,at||ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,(at||ac.currentTime)+d);o.connect(g);g.connect(mg);o.start(at||ac.currentTime);o.stop((at||ac.currentTime)+d+.05);};
  const sfx={
    wall:()=>t(200,'sine',.12,.06),
    pad:()=>{t(320,'sine',.18,.08);t(480,'sine',.08,.05);},
    hit:()=>t(160,'square',.1,.07),
    brk:(n)=>{t(380+n*35,'sawtooth',.18,.14);t(190+n*18,'sine',.09,.2);},
    steel:()=>t(85,'square',.28,.1),
    expl:()=>{for(let i=0;i<3;i++)t(75+i*25,'sawtooth',.22-i*.06,.3+i*.1,ac.currentTime+i*.09);},
    pu:()=>{[520,660,780].forEach((f,i)=>t(f,'sine',.18,.15,ac.currentTime+i*.1));},
    life:()=>{[390,490,590,780].forEach((f,i)=>t(f,'sine',.22,.2,ac.currentTime+i*.12));},
    win:()=>{[520,660,780,1040].forEach((f,i)=>t(f,'triangle',.28,.4,ac.currentTime+i*.15));},
    over:()=>{[440,392,330,262].forEach((f,i)=>t(f,'sawtooth',.22,.5,ac.currentTime+i*.18));},
    laser:()=>{t(900,'sawtooth',.18,.07);t(450,'sawtooth',.09,.05);},
    combo:(n)=>t(280+n*38,'sine',.13,.09),
  };
  const startBG=()=>{if(!ac||bgn)return;[55,110,165,220].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.035-i*.007;o.connect(g);g.connect(bg);o.start();});bg.gain.setValueAtTime(0,ac.currentTime);bg.gain.linearRampToValueAtTime(1,ac.currentTime+1.5);bgn=true;};
  const stopBG=()=>{if(!bg)return;bg.gain.linearRampToValueAtTime(0,ac.currentTime+.5);bgn=null;};
  return{init,sfx,startBG,stopBG};
})();

// ── CANVAS ─────────────────────────────────────────────────────────────────
const cv=document.getElementById('gc'),cx=cv.getContext('2d');
let sc=1;
function resize(){sc=Math.min(innerWidth/GW,innerHeight/GH);cv.width=Math.floor(GW*sc);cv.height=Math.floor(GH*sc);cx.setTransform(sc,0,0,sc,0,0);}
resize();window.addEventListener('resize',resize);

// ── PARTICLES ──────────────────────────────────────────────────────────────
const PX=[];
function px(x,y,n,col,o={}){for(let i=0;i<n;i++){const ang=o.ang!==undefined?o.ang+(Math.random()-.5)*.6:Math.random()*Math.PI*2,spd=o.spd||(2+Math.random()*4);PX.push({x,y,vx:Math.cos(ang)*spd*(0.5+Math.random()),vy:Math.sin(ang)*spd*(0.5+Math.random()),life:1,dec:.03+Math.random()*.04,sz:o.sz||(2+Math.random()*2.5),col:o.cols?o.cols[0|Math.random()*o.cols.length]:col,grav:o.grav??0.08});}}
function ft(x,y,txt,col,sz=15){PX.push({ft:true,x,y,txt,col,sz,life:1,dec:.02,vy:-1.4});}
function updPX(){for(let i=PX.length-1;i>=0;i--){const p=PX[i];p.life-=p.dec;if(p.life<=0){PX.splice(i,1);continue;}if(!p.ft){p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav||0;p.vx*=.98;}else p.y+=p.vy;}}
function drwPX(){PX.forEach(p=>{cx.save();cx.globalAlpha=p.life;if(p.ft){cx.font=`bold ${p.sz}px Orbitron`;cx.fillStyle=p.col;cx.textAlign='center';cx.shadowColor=p.col;cx.shadowBlur=8;cx.fillText(p.txt,p.x,p.y);}else{cx.fillStyle=p.col;cx.shadowColor=p.col;cx.shadowBlur=5;cx.beginPath();cx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);cx.fill();}cx.restore();});}

// ── SHAKE ──────────────────────────────────────────────────────────────────
let shk=0,skx=0,sky=0;
function shake(a){shk=Math.max(shk,a);}
function updShk(){if(shk>.2){skx=(Math.random()-.5)*shk*2;sky=(Math.random()-.5)*shk*2;shk*=.84;}else{skx=0;sky=0;shk=0;}}

// ── TOASTS ─────────────────────────────────────────────────────────────────
const TC=document.getElementById('toasts'),ATV=[];
function toast(id,icon,label,dur,col='#00D9FF'){
  const ix=ATV.findIndex(t=>t.id===id);if(ix!==-1){ATV[ix].el.remove();ATV.splice(ix,1);}
  if(!dur)return;
  const el=document.createElement('div');el.className='toast';el.style.borderLeftColor=col;
  el.innerHTML=`<span style="color:${col}">${icon}</span> ${label}<div class="tbar" style="background:${col};width:100%"></div>`;
  TC.appendChild(el);
  const obj={id,el,start:performance.now(),dur:dur*1000};ATV.push(obj);
  const bar=el.querySelector('.tbar');
  const anim=now=>{const p=Math.max(0,1-(now-obj.start)/obj.dur);bar.style.width=p*100+'%';if(p<.15)el.classList.add('exp');if(p>0)requestAnimationFrame(anim);else{el.style.opacity='0';setTimeout(()=>{el.remove();const i=ATV.indexOf(obj);if(i!==-1)ATV.splice(i,1);},400);}};
  requestAnimationFrame(anim);
}
function rmToast(id){const ix=ATV.findIndex(t=>t.id===id);if(ix!==-1){ATV[ix].el.remove();ATV.splice(ix,1);}}

// ── LEVELS ─────────────────────────────────────────────────────────────────
const BT={
  N:{hp:1,pts:10,col:'#00D9FF',glow:'#00D9FF'},
  D:{hp:2,pts:25,col:'#9B5DE5',glow:'#9B5DE5'},
  T:{hp:3,pts:40,col:'#FF006E',glow:'#FF006E'},
  S:{hp:99,pts:0,col:'#607090',glow:'#8090B0'},
  G:{hp:1,pts:15,col:'rgba(160,230,255,.25)',glow:'#AADDFF',glass:true},
  E:{hp:1,pts:50,col:'#FF6B35',glow:'#FFD60A',expl:true},
};

function genLevel(lv){
  const rows=Math.min(3+Math.floor(lv*.7),12);
  const pats=[
    (r,c)=>true,
    (r,c)=>(r+c)%2===0,
    (r,c)=>Math.abs(r-rows/2)+Math.abs(c-COLS/2)<Math.min(rows,COLS)/2+2,
    (r,c)=>r===0||r===rows-1||c===0||c===COLS-1,
    (r,c)=>r===Math.floor(rows/2)||c===Math.floor(COLS/2),
    (r,c)=>{const cr=r/rows,cc=c/COLS;return Math.abs(cr-cc)<.2||Math.abs(cr-(1-cc))<.2;},
  ];
  const pat=pats[Math.floor(Math.random()*Math.min(pats.length,1+lv/3))];
  const bks=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<COLS;c++){
      if(!pat(r,c))continue;
      const x=(GW-COLS*(BW+BGAP)+BGAP)/2+c*(BW+BGAP);
      const y=BRICK_Y+r*(BH+BGAP);
      const roll=Math.random();
      let tp='N';
      if(lv>=10&&roll<.08)tp='E';
      else if(lv>=8&&roll<.15)tp='T';
      else if(lv>=6&&roll<.12)tp='S';
      else if(lv>=5&&roll<.14)tp='G';
      else if(lv>=3&&roll<.18)tp='D';
      const b=BT[tp];
      bks.push({x,y,w:BW,h:BH,tp,hp:b.hp,mhp:b.hp,pts:b.pts,col:b.col,glow:b.glow,glass:b.glass||false,expl:b.expl||false,alive:true,fl:0,dx:0,dy:0,dents:0});
    }
  }
  return bks;
}

// ── POWER-UPS ──────────────────────────────────────────────────────────────
const PT={
  MB:{col:C.cyan,icon:'✦',label:'×2 BALLS',dur:0},
  BP:{col:C.grn,icon:'◀▶',label:'BIG PAD',dur:12},
  EL:{col:C.mag,icon:'♥',label:'+1 LIFE',dur:0},
  SM:{col:C.yel,icon:'⏱',label:'SLOW-MO',dur:8},
  LZ:{col:C.red,icon:'⚡',label:'LASER',dur:10},
  MG:{col:C.pur,icon:'⊛',label:'MAGNET',dur:8},
};

// ── STATE ──────────────────────────────────────────────────────────────────
const ST={MENU:0,PLAY:1,PAUSE:2,LVL:3,OVER:4,WIN:5,LB:6,CTRL:7};
let state=ST.MENU;
let score=0,hiSc=+localStorage.getItem('nb_hi')||0,scoreAn=0;
let lives=3,level=1,combo=0,maxCombo=0;
let bricks=[],balls=[],pups=[],lasers=[];
let pad={x:GW/2-50,y:GH-60,w:100,h:14,spd:7};
let eff={};
let lb=JSON.parse(localStorage.getItem('nb_lb')||'[]');
let lvlTime=0;
let stars=[];
const MOPT=['▶  PLAY','🏆  LEADERBOARD','⌨  CONTROLS'];
let msel=0;
const POPT=['▶  RESUME','↺  RESTART','✕  QUIT'];
let psel=0;

// ── STARS ──────────────────────────────────────────────────────────────────
(function initStars(){stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*GW,y:Math.random()*GH,r:Math.random()*1.2,spd:.08+Math.random()*.25,ph:Math.random()*Math.PI*2});})();

// ── HELPERS ────────────────────────────────────────────────────────────────
function rr(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();}
function hex2rgba(h,a){try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}catch{return h;}}
function glassPanel(x,y,w,h,r=12){cx.save();cx.fillStyle='rgba(8,18,44,.85)';rr(x,y,w,h,r);cx.fill();cx.strokeStyle='rgba(0,217,255,.3)';cx.lineWidth=1.5;rr(x,y,w,h,r);cx.stroke();cx.fillStyle='rgba(255,255,255,.03)';rr(x+2,y+2,w-4,h/3,r);cx.fill();cx.restore();}

// ── INIT GAME ──────────────────────────────────────────────────────────────
function initGame(lv=1){level=lv;score=0;scoreAn=0;lives=3;combo=0;maxCombo=0;eff={};PX.length=0;newLevel();}
function newLevel(){bricks=genLevel(level);balls=[mkBall(true)];pups=[];lasers=[];pad.w=100;pad.x=GW/2-50;eff={};PX.length=0;combo=0;lvlTime=Date.now();}
function mkBall(held=true){return{x:GW/2,y:pad.y-16,vx:(Math.random()>.5?1:-1)*3.2,vy:-4.8,r:7,held,trail:[]};}

// ── INPUT ──────────────────────────────────────────────────────────────────
const keys={};let mX=GW/2,tX=null;
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(state===ST.MENU){
    if(e.code==='ArrowUp')msel=(msel-1+MOPT.length)%MOPT.length;
    if(e.code==='ArrowDown')msel=(msel+1)%MOPT.length;
    if(e.code==='Enter'||e.code==='Space')doMenu();
  } else if(state===ST.PAUSE){
    if(e.code==='ArrowUp')psel=(psel-1+POPT.length)%POPT.length;
    if(e.code==='ArrowDown')psel=(psel+1)%POPT.length;
    if(e.code==='Enter'||e.code==='Space')doPause();
    if(e.code==='Escape'||e.code==='KeyP'){state=ST.PLAY;Aud.startBG();}
  } else if(state===ST.PLAY){
    if(e.code==='Space'||e.code==='ArrowUp')launch();
    if(e.code==='Escape'||e.code==='KeyP'){state=ST.PAUSE;psel=0;Aud.stopBG();}
    if(e.code==='KeyZ'&&eff.LZ&&eff.LZ>Date.now())fireLaser();
  } else if(state===ST.LVL&&(e.code==='Space'||e.code==='Enter'))nextLevel();
  else if((state===ST.OVER||state===ST.WIN)&&(e.code==='Space'||e.code==='Enter'))state=ST.MENU;
  else if((state===ST.LB||state===ST.CTRL)&&(e.code==='Space'||e.code==='Escape'||e.code==='Enter'))state=ST.MENU;
  e.preventDefault&&e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mX=(e.clientX-r.left)/sc;document.getElementById('cur').style.cssText=`left:${e.clientX}px;top:${e.clientY}px;`;});
cv.addEventListener('click',e=>{
  Aud.init();
  const r=cv.getBoundingClientRect(),cx2=(e.clientX-r.left)/sc,cy=(e.clientY-r.top)/sc;
  if(state===ST.MENU)clkMenu(cx2,cy);
  else if(state===ST.PAUSE)clkPause(cx2,cy);
  else if(state===ST.PLAY){launch();if(eff.LZ&&eff.LZ>Date.now())fireLaser();}
  else if(state===ST.LVL)nextLevel();
  else if(state===ST.OVER||state===ST.WIN)state=ST.MENU;
  else if(state===ST.LB||state===ST.CTRL)state=ST.MENU;
});
cv.addEventListener('touchstart',e=>{e.preventDefault();Aud.init();const t=e.touches[0],r=cv.getBoundingClientRect();tX=(t.clientX-r.left)/sc;const cy=(t.clientY-r.top)/sc;if(state===ST.MENU)clkMenu(tX,cy);else if(state===ST.PAUSE)clkPause(tX,cy);else if(state===ST.PLAY)launch();else if(state===ST.LVL)nextLevel();else if(state===ST.OVER||state===ST.WIN)state=ST.MENU;else if(state===ST.LB||state===ST.CTRL)state=ST.MENU;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=cv.getBoundingClientRect();tX=(t.clientX-r.left)/sc;},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();},{passive:false});

function doMenu(){Aud.init();if(msel===0){initGame();state=ST.PLAY;Aud.startBG();}else if(msel===1)state=ST.LB;else state=ST.CTRL;}
function clkMenu(x,y){MOPT.forEach((_,i)=>{const by=GH*.52+i*64;if(y>by-22&&y<by+22){msel=i;doMenu();}});}
function doPause(){if(psel===0){state=ST.PLAY;Aud.startBG();}else if(psel===1){initGame();state=ST.PLAY;Aud.startBG();}else state=ST.MENU;}
function clkPause(x,y){POPT.forEach((_,i)=>{const by=GH/2+i*58;if(y>by-22&&y<by+22){psel=i;doPause();}});}
function launch(){balls.forEach(b=>{if(b.held)b.held=false;});}
function fireLaser(){if(!eff.LZ||eff.LZ<Date.now())return;lasers.push({x:pad.x+14,y:pad.y},{x:pad.x+pad.w-14,y:pad.y});Aud.sfx.laser();}
function nextLevel(){level++;if(level>15){saveSc();state=ST.WIN;spawnWinFX();return;}newLevel();state=ST.PLAY;Aud.startBG();}

// ── POWER-UP ACTIVATE ──────────────────────────────────────────────────────
function actPU(tp){
  Aud.sfx.pu();const now=Date.now(),pt=PT[tp];
  if(tp==='MB'){const nb=[];balls.forEach(b=>{if(!b.held){nb.push({...b,vx:b.vx+2,trail:[]});nb.push({...b,vx:b.vx-2,vy:b.vy-1,trail:[]});}});balls.push(...nb);}
  else if(tp==='EL'){lives=Math.min(lives+1,5);Aud.sfx.life();ft(GW/2,GH/2,'+1 LIFE!',C.mag,22);}
  else if(tp==='BP'){eff.BP=now+pt.dur*1000;pad.w=162;toast('BP',pt.icon,pt.label,pt.dur,pt.col);}
  else if(tp==='SM'){eff.SM=now+pt.dur*1000;toast('SM',pt.icon,pt.label,pt.dur,pt.col);}
  else if(tp==='LZ'){eff.LZ=now+pt.dur*1000;toast('LZ',pt.icon,pt.label,pt.dur,pt.col);}
  else if(tp==='MG'){eff.MG=now+pt.dur*1000;toast('MG',pt.icon,pt.label,pt.dur,pt.col);}
}
function chkEff(){const now=Date.now();if(eff.BP&&eff.BP<now){delete eff.BP;pad.w=100;rmToast('BP');}if(eff.SM&&eff.SM<now){delete eff.SM;rmToast('SM');}if(eff.LZ&&eff.LZ<now){delete eff.LZ;rmToast('LZ');}if(eff.MG&&eff.MG<now){delete eff.MG;rmToast('MG');}}

// ── SAVE ───────────────────────────────────────────────────────────────────
function saveSc(){if(score>hiSc){hiSc=score;localStorage.setItem('nb_hi',hiSc);}lb.push({score,level,date:new Date().toLocaleDateString()});lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,15);localStorage.setItem('nb_lb',JSON.stringify(lb));}

// ── COLLISION ──────────────────────────────────────────────────────────────
function ballHitsBrick(ball,b){const cx2=Math.max(b.x,Math.min(ball.x,b.x+b.w)),cy=Math.max(b.y,Math.min(ball.y,b.y+b.h)),dx=ball.x-cx2,dy=ball.y-cy;return dx*dx+dy*dy<ball.r*ball.r;}
function resolveB(ball,b){const ox=(b.x+b.w/2)-ball.x,oy=(b.y+b.h/2)-ball.y,hw=b.w/2+ball.r,hh=b.h/2+ball.r;if(Math.abs(ox/hw)>Math.abs(oy/hh)){ball.vx=Math.abs(ball.vx)*(ball.x<b.x+b.w/2?-1:1);}else{ball.vy=Math.abs(ball.vy)*(ball.y<b.y+b.h/2?-1:1);}}

function hitBrick(b,ball){
  if(!b.alive)return;
  if(b.tp==='S'){b.fl=1;b.dents++;Aud.sfx.steel();px(b.x+b.w/2,b.y+b.h,6,'#8090B0',{grav:.15});return;}
  b.hp--;b.fl=1;combo++;if(combo>maxCombo)maxCombo=combo;
  if(combo>1)Aud.sfx.combo(Math.min(combo,20));
  const mul=Math.min(1+combo*.1,3.5);
  if(b.hp<=0){
    b.alive=false;const pts=Math.round(b.pts*mul*level);score+=pts;ft(b.x+b.w/2,b.y,'+'+pts,C.cyan);Aud.sfx.brk(b.pts/20);
    if(b.expl){shake(9);Aud.sfx.expl();px(b.x+b.w/2,b.y+b.h/2,28,C.orn,{cols:[C.orn,C.yel,C.red],grav:.05,spd:5});bricks.forEach(nb=>{if(nb.alive&&nb!==b&&nb.tp!=='S'){const d=Math.hypot(nb.x-b.x,nb.y-b.y);if(d<80)setTimeout(()=>hitBrick(nb,ball),80);}});}
    else{shake(3+combo*.3);px(b.x+b.w/2,b.y+b.h/2,14,b.col,{cols:[b.col,C.cyan,'#FFFFFF',b.glow],grav:.08});if(b.glass)px(b.x+b.w/2,b.y+b.h/2,8,'#AADDFF',{sz:1.5,grav:.05});}
    if(Math.random()<.12&&b.tp!=='E'){const ptp=Object.keys(PT);pups.push({x:b.x+b.w/2,y:b.y+b.h/2,vy:1.8,tp:ptp[0|Math.random()*ptp.length]});}
  }else{b.dx=(Math.random()-.5)*4;b.dy=(Math.random()-.5)*4;score+=Math.round(5*mul);Aud.sfx.hit();px(b.x+b.w/2,b.y+b.h/2,5,b.glow,{sz:2});}
}

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(){
  if(state!==ST.PLAY)return;
  chkEff();
  const slw=(eff.SM&&eff.SM>Date.now())?.5:1;
  scoreAn+=(score-scoreAn)*.12;if(Math.abs(score-scoreAn)<1)scoreAn=score;

  // Paddle
  const tx=tX!==null?tX-pad.w/2:mX-pad.w/2;
  if(keys['ArrowLeft']||keys['KeyA'])pad.x-=pad.spd*2;
  if(keys['ArrowRight']||keys['KeyD'])pad.x+=pad.spd*2;
  else pad.x+=(tx-pad.x)*.18;
  pad.x=Math.max(0,Math.min(GW-pad.w,pad.x));

  // Balls
  balls.forEach(ball=>{
    if(ball.held){ball.x=pad.x+pad.w/2;ball.y=pad.y-ball.r-2;return;}
    ball.trail.push({x:ball.x,y:ball.y});if(ball.trail.length>10)ball.trail.shift();
    for(let s=0;s<3;s++){
      ball.x+=ball.vx*slw/3;ball.y+=ball.vy*slw/3;
      if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);Aud.sfx.wall();shake(1);}
      if(ball.x+ball.r>GW){ball.x=GW-ball.r;ball.vx=-Math.abs(ball.vx);Aud.sfx.wall();shake(1);}
      if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);Aud.sfx.wall();shake(1);}
      // Paddle
      if(ball.vy>0&&ball.y+ball.r>pad.y&&ball.y-ball.r<pad.y+pad.h&&ball.x>pad.x-ball.r&&ball.x<pad.x+pad.w+ball.r){
        ball.y=pad.y-ball.r;
        const hp=(ball.x-pad.x)/pad.w;
        const ang=-Math.PI/2+(hp-.5)*(Math.PI*56/90);
        const spd=Math.min(Math.hypot(ball.vx,ball.vy)*1.01,13);
        ball.vx=Math.cos(ang)*spd;ball.vy=Math.sin(ang)*spd;
        combo=0;Aud.sfx.pad();shake(2);
        if(eff.MG&&eff.MG>Date.now()){ball.held=true;px(ball.x,ball.y,6,C.pur,{spd:2});}
        px(ball.x,pad.y,5,C.cyan,{spd:2,grav:-.05,ang:-Math.PI/2});
      }
      // Bricks
      for(let i=0;i<bricks.length;i++){const b=bricks[i];if(!b.alive)continue;if(ballHitsBrick(ball,b)){resolveB(ball,b);hitBrick(b,ball);break;}}
    }
    const spd=Math.hypot(ball.vx,ball.vy);
    if(spd>14){ball.vx*=14/spd;ball.vy*=14/spd;}
    if(spd<3&&!ball.held){ball.vx*=3/spd;ball.vy*=3/spd;}
  });

  // Lasers
  lasers.forEach(l=>{l.y-=10;bricks.forEach(b=>{if(b.alive&&l.y>b.y&&l.y<b.y+b.h&&l.x>b.x&&l.x<b.x+b.w){hitBrick(b,null);l.y=-100;}});});
  lasers=lasers.filter(l=>l.y>0);

  // Powerups
  pups.forEach(p=>{p.y+=p.vy;if(p.y>pad.y&&p.y<pad.y+pad.h+p.vy*2&&p.x>pad.x&&p.x<pad.x+pad.w){actPU(p.tp);p.done=true;px(p.x,p.y,10,PT[p.tp].col);}});
  pups=pups.filter(p=>!p.done&&p.y<GH+30);

  // Ball out
  balls=balls.filter(b=>b.y-b.r<GH+20);
  if(balls.length===0){lives--;combo=0;if(lives<=0){saveSc();state=ST.OVER;Aud.sfx.over();Aud.stopBG();}else{Aud.sfx.life();shake(7);balls=[mkBall(true)];}}

  // Level clear
  if(bricks.filter(b=>b.alive&&b.tp!=='S').length===0){score+=lives*500+Math.max(0,10000-((Date.now()-lvlTime)/100|0));state=ST.LVL;Aud.sfx.win();Aud.stopBG();px(GW/2,GH/2,60,C.cyan,{cols:[C.cyan,C.mag,C.yel,C.grn],spd:7,grav:.03});}

  bricks.forEach(b=>{b.fl=Math.max(0,b.fl-.06);b.dx*=.8;b.dy*=.8;});
  updPX();updShk();
  stars.forEach(s=>{s.y+=s.spd;if(s.y>GH){s.y=0;s.x=Math.random()*GW;}});
}

  cx.font='bold 26px Orbitron';cx.textAlign='center';cx.fillStyle=C.grn;cx.shadowColor=C.grn;cx.shadowBlur=16+4*Math.sin(t);cx.fillText('LEVEL CLEAR!',GW/2,py+100);cx.shadowBlur=0;
  cx.font='12px Orbitron';cx.fillStyle=C.dim;cx.fillText('LEVEL '+level+' COMPLETE',GW/2,py+126);
  [['SCORE',score.toLocaleString()],['MAX COMBO',maxCombo+'x'],['LIVES REMAINING',lives],['TIME BONUS',Math.max(0,10000-((Date.now()-lvlTime)/100|0)).toLocaleString()]].forEach(([k,v],i)=>{const y=py+164+i*36;cx.font='11px Share Tech Mono';cx.fillStyle=C.dim;cx.textAlign='left';cx.fillText(k,px2+28,y);cx.fillStyle=C.txt;cx.textAlign='right';cx.fillText(v,px2+pw-28,y);});
  cx.strokeStyle='rgba(0,217,255,.18)';cx.lineWidth=1;cx.beginPath();cx.moveTo(px2+24,py+312);cx.lineTo(px2+pw-24,py+312);cx.stroke();
  const bw=220,bh=46,bx=GW/2-bw/2,by=py+328;glassPanel(bx,by,bw,bh,10);cx.strokeStyle=C.cyan;cx.lineWidth=1.5;cx.shadowColor=C.cyan;cx.shadowBlur=10+4*Math.sin(t*2);rr(bx,by,bw,bh,10);cx.stroke();cx.shadowBlur=0;cx.font='bold 15px Orbitron';cx.fillStyle=C.cyan;cx.textAlign='center';cx.fillText(level<15?'NEXT LEVEL  ▶':'▶  FINAL LEVEL!',GW/2,by+30);
}

function drwOver(){
  cx.fillStyle='rgba(4,4,14,.9)';cx.fillRect(0,0,GW,GH);
  const t=Date.now()*.003,pw=368,ph=420,px2=GW/2-pw/2,py=GH/2-ph/2-22;
  glassPanel(px2,py,pw,ph,16);cx.strokeStyle=C.red;cx.lineWidth=1.5;rr(px2,py,pw,ph,16);cx.stroke();
  cx.font='bold 38px Orbitron';cx.textAlign='center';cx.fillStyle=C.red;cx.shadowColor=C.red;cx.shadowBlur=20+8*Math.sin(t);cx.fillText('GAME OVER',GW/2,py+68);cx.shadowBlur=0;
  [['FINAL SCORE',score.toLocaleString(),C.yel],['BEST SCORE',hiSc.toLocaleString(),C.cyan],['LEVEL REACHED',String(level),C.txt],['MAX COMBO',maxCombo+'x',C.mag]].forEach(([k,v,c],i)=>{const y=py+128+i*54;cx.font='10px Orbitron';cx.fillStyle=C.dim;cx.textAlign='center';cx.fillText(k,GW/2,y);cx.font='bold 20px Share Tech Mono';cx.fillStyle=c;cx.shadowColor=c;cx.shadowBlur=6;cx.fillText(v,GW/2,y+25);cx.shadowBlur=0;});
  if(score>=hiSc&&score>0){cx.font='bold 12px Orbitron';cx.fillStyle=C.yel;cx.shadowColor=C.yel;cx.shadowBlur=10;cx.fillText('★  NEW HIGH SCORE!  ★',GW/2,py+370);cx.shadowBlur=0;}
  const bw=220,bh=46,bx=GW/2-bw/2,by=py+388;glassPanel(bx,by,bw,bh,10);cx.strokeStyle=C.mag;cx.lineWidth=1.5;cx.shadowColor=C.mag;cx.shadowBlur=8+4*Math.sin(t);rr(bx,by,bw,bh,10);cx.stroke();cx.shadowBlur=0;cx.font='bold 14px Orbitron';cx.fillStyle=C.mag;cx.textAlign='center';cx.fillText('▶  MAIN MENU',GW/2,by+30);
}

function spawnWinFX(){for(let i=0;i<80;i++)setTimeout(()=>px(Math.random()*GW,Math.random()*GH*.5,3,C.yel,{cols:[C.cyan,C.mag,C.yel,C.grn],spd:5,grav:.03}),i*60);}
function drwWin(){
  drwBg();drwPX();cx.fillStyle='rgba(4,8,22,.55)';cx.fillRect(0,0,GW,GH);
  const t=Date.now()*.002,pw=370,ph=440,px2=GW/2-pw/2,py=GH/2-ph/2-22;
  glassPanel(px2,py,pw,ph,16);cx.strokeStyle=C.yel;cx.lineWidth=2;rr(px2,py,pw,ph,16);cx.stroke();
  const tg=cx.createLinearGradient(0,0,GW,0);tg.addColorStop(0,C.yel);tg.addColorStop(.5,'#FFF');tg.addColorStop(1,C.cyan);
  cx.font='bold 32px Orbitron';cx.textAlign='center';cx.fillStyle=tg;cx.shadowColor=C.yel;cx.shadowBlur=20+8*Math.sin(t);cx.fillText('VICTORY!',GW/2,py+68);cx.shadowBlur=0;
  cx.font='13px Share Tech Mono';cx.fillStyle=C.dim;cx.fillText('ALL 15 LEVELS CLEARED',GW/2,py+92);
  [['FINAL SCORE',score.toLocaleString(),C.yel],['BEST SCORE',hiSc.toLocaleString(),C.cyan],['LIVES LEFT',String(lives),C.mag],['MAX COMBO',maxCombo+'x',C.grn]].forEach(([k,v,c],i)=>{const y=py+140+i*58;cx.font='10px Orbitron';cx.fillStyle=C.dim;cx.textAlign='center';cx.fillText(k,GW/2,y);cx.font='bold 22px Share Tech Mono';cx.fillStyle=c;cx.shadowColor=c;cx.shadowBlur=8;cx.fillText(v,GW/2,y+28);cx.shadowBlur=0;});
  const bw=220,bh=46,bx=GW/2-bw/2,by=py+418;glassPanel(bx,by,bw,bh,10);cx.strokeStyle=C.yel;cx.lineWidth=1.5;cx.shadowColor=C.yel;cx.shadowBlur=10+4*Math.sin(t);rr(bx,by,bw,bh,10);cx.stroke();cx.shadowBlur=0;cx.font='bold 14px Orbitron';cx.fillStyle=C.yel;cx.textAlign='center';cx.fillText('▶  MAIN MENU',GW/2,by+30);
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  cx.save();cx.translate(skx,sky);
  if(state===ST.MENU){drwMenu();}
  else if(state===ST.LB){drwLB();}
  else if(state===ST.CTRL){drwCtrl();}
  else{
    drwBg();drwArena();
    bricks.forEach(drwBrick);pups.forEach(drwPU);lasers.forEach(drwLaser);
    balls.forEach(drwBall);drwPad();drwPX();drwHUD();
    if(state===ST.PAUSE)drwPause();
    else if(state===ST.LVL)drwLVL();
    else if(state===ST.OVER)drwOver();
    else if(state===ST.WIN)drwWin();
  }
  cx.restore();
}

// ── LOOP ───────────────────────────────────────────────────────────────────
let lt=0;
function loop(ts){const dt=Math.min((ts-lt)/16.67,3);lt=ts;update();render();requestAnimationFrame(loop);}
requestAnimationFrame(loop);

// ── CURSOR ─────────────────────────────────────────────────────────────────
document.addEventListener('mousemove',e=>{const c=document.getElementById('cur');c.style.left=e.clientX+'px';c.style.top=e.clientY+'px';});
</script>
